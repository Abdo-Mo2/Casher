<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الكاشير — FastPOS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <nav class="sidebar">
    <div class="logo">🍔 FastPOS</div>
    <span id="offline-badge" class="offline-badge">● يعمل محلياً</span>
    <a href="/" class="nav-item active">🧾 الكاشير</a>
    <a href="/products.html" class="nav-item">📦 المنتجات</a>
    <a href="/dashboard.html" class="nav-item">📊 الإحصائيات</a>
  </nav>

  <main class="main-content">
    <div class="cashier-layout">
      <section class="products-section">
        <div id="category-filters" class="category-filters"></div>
        <div id="product-grid" class="product-grid"></div>
      </section>
      <aside class="cart-section">
        <div class="cart-sidebar">
          <div class="form-group cashier-field">
            <label for="cashier-name">اسم الكاشير *</label>
            <input type="text" id="cashier-name" placeholder="مثال: أحمد" required>
          </div>
          <h2>السلة</h2>
          <div id="cart-items" class="cart-items">
            <p class="cart-empty">السلة فارغة</p>
          </div>
          <div class="cart-options">
            <label class="option-label">نوع الطلب</label>
            <div class="option-chips" id="order-type-chips">
              <button type="button" class="option-chip active" data-value="dinein">صالة</button>
              <button type="button" class="option-chip" data-value="takeaway">تيك أواي</button>
              <button type="button" class="option-chip" data-value="delivery">دليفري</button>
            </div>
            <div id="table-number-wrap" class="form-group table-field">
              <label for="table-number">رقم الطاولة</label>
              <input type="text" id="table-number" placeholder="مثال: 5">
            </div>
            <label class="option-label">طريقة الدفع</label>
            <div class="option-chips" id="payment-type-chips">
              <button type="button" class="option-chip active" data-value="cash">نقدي</button>
              <button type="button" class="option-chip" data-value="card">بطاقة</button>
              <button type="button" class="option-chip" data-value="delivery">دليفري</button>
            </div>
          </div>
          <div class="cart-total">
            <span>الإجمالي</span>
            <span id="cart-total">0 جنيه</span>
          </div>
          <button id="confirm-btn" class="btn btn-full" disabled>تأكيد الطلب</button>
          <button type="button" id="reprint-btn" class="btn btn-secondary btn-full" disabled>إعادة طباعة آخر فاتورة</button>
        </div>
      </aside>
    </div>
  </main>

  <div id="receipt-modal" class="modal-overlay">
    <div class="modal-card receipt-print">
      <div class="receipt-header">
        <h2 id="receipt-shop-name">🍔 FastPOS</h2>
        <p class="receipt-meta" id="receipt-shop-phone"></p>
        <p class="receipt-meta" id="receipt-shop-address"></p>
        <p class="receipt-meta" id="receipt-cashier"></p>
        <p class="receipt-meta" id="receipt-order-meta"></p>
        <p class="receipt-meta" id="receipt-order-num"></p>
        <p class="receipt-meta" id="receipt-datetime"></p>
      </div>
      <ul id="receipt-items" class="receipt-items"></ul>
      <div class="receipt-total">
        <span>الإجمالي</span>
        <span id="receipt-total"></span>
      </div>
      <div class="receipt-code-block">
        <div id="qrcode" class="receipt-qrcode"></div>
        <p id="receipt-serial" class="receipt-serial"></p>
      </div>
      <div class="modal-actions no-print">
        <button id="print-btn" class="btn">طباعة</button>
        <button id="close-btn" class="btn btn-secondary">إغلاق</button>
      </div>
    </div>
  </div>

  <script src="js/vendor/qrcode.min.js"></script>
  <script src="js/categories.js"></script>
  <script src="js/labels.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/db.js"></script>
  <script src="js/alerts.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/cashier.js"></script>
</body>
</html>
