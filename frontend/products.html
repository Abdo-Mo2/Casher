<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المنتجات — FastPOS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <nav class="sidebar">
    <div class="logo">🍔 FastPOS</div>
    <span id="offline-badge" class="offline-badge">● يعمل محلياً</span>
    <a href="index.html" class="nav-item">🧾 الكاشير</a>
    <a href="products.html" class="nav-item active">📦 المنتجات</a>
    <a href="dashboard.html" class="nav-item">📊 الإحصائيات</a>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">إدارة المنتجات</h1>
      <button id="add-btn" class="btn">إضافة منتج</button>
    </div>

    <div id="product-form" class="card product-form">
      <form id="form">
        <input type="hidden" id="edit-id">
        <div class="form-grid">
          <div class="form-group">
            <label for="name">اسم المنتج *</label>
            <input type="text" id="name" required>
          </div>
          <div class="form-group">
            <label for="price">السعر *</label>
            <input type="number" id="price" min="0" step="0.01" required>
          </div>
          <div class="form-group">
            <label for="category">الفئة / الكلمة المفتاحية</label>
            <select id="category" required></select>
          </div>
          <div class="form-group form-group-full">
            <label for="image">صورة المنتج</label>
            <input type="file" id="image" accept="image/jpeg,image/png,image/webp,image/gif">
            <div id="image-preview" class="image-preview"></div>
          </div>
        </div>
        <div class="category-keywords">
          <span class="keywords-label">اقتراحات سريعة:</span>
          <div id="keyword-chips" class="keyword-chips"></div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn">حفظ</button>
          <button type="button" id="cancel-btn" class="btn btn-secondary">إلغاء</button>
        </div>
      </form>
    </div>

    <table class="data-table">
      <thead>
        <tr>
          <th>الصورة</th>
          <th>الاسم</th>
          <th>الفئة</th>
          <th>السعر</th>
          <th>إجراءات</th>
        </tr>
      </thead>
      <tbody id="products-tbody"></tbody>
    </table>
  </main>

  <script src="js/categories.js"></script>
  <script src="js/db.js"></script>
  <script src="js/alerts.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
